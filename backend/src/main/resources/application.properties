# Server
server.port=8080

# DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mineral_forecasting}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:13000}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=${JWT_SECRET:default-secret-change-me-please-12345}
app.jwt.access-expiry-ms=${JWT_ACCESS_EXPIRY_MS:900000}
app.jwt.refresh-expiry-ms=${JWT_REFRESH_EXPIRY_MS:604800000}

# Admin seed
app.admin.email=${ADMIN_EMAIL:admin@bfmining.com}
app.admin.password=${ADMIN_PASSWORD:Admin@12345}

# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:confianceingabire09@gmail.com}
spring.mail.password=${MAIL_APP_PASSWORD:lwbd jyow eeww rbvq}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@bfmining.com}

# Frontend URL (used in email links)
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ML Service
app.ml.service-url=${ML_SERVICE_URL:http://localhost:8000}

# Multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Dataset storage
app.storage.path=${user.home}/mineral-forecasting/datasets

# OpenAPI
springdoc.swagger-ui.path=/api/docs
springdoc.api-docs.path=/v3/api-docs

# Logging
logging.level.com.bfmining=INFO
